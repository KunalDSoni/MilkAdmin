name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # Prisma client must be generated before typecheck so enums
      # (Role, ProductCategory, Uom etc.) exist in @prisma/client.
      - name: Generate Prisma client
        run: npx prisma generate --schema packages/database/prisma/schema.prisma

      # Turbo resolves the topo order: contracts/database build first.
      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Only fail on critical advisories. High-severity findings in multer
      # (NestJS) and postcss (Next.js) have no non-breaking fix available yet.
      - name: npm audit (critical only)
        run: npm audit --audit-level=critical
